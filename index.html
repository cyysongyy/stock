<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>台股持股格式轉換器</title>
<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1117;--card:#1a1d27;--card2:#22263a;--blue:#4a9eff;--green:#00c076;--red:#ff4757;--amber:#f5a623;--text:#e8eaf0;--sub:#8892a4;--border:#2a2f45}
body{background:var(--bg);color:var(--text);font-family:-apple-system,sans-serif;font-size:13px;min-height:100vh;padding:16px;max-width:600px;margin:0 auto}
h1{font-size:18px;font-weight:700;margin-bottom:4px;color:var(--blue)}
.sub{font-size:11px;color:var(--sub);margin-bottom:16px}
.card{background:var(--card);border-radius:12px;padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.card h2{font-size:11px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}

/* Upload zone */
.upload-zone{border:2px dashed var(--border);border-radius:10px;padding:28px;text-align:center;cursor:pointer;transition:.2s}
.upload-zone:hover,.upload-zone.drag{border-color:var(--blue);background:#4a9eff0a}
.upload-zone .icon{font-size:36px;margin-bottom:8px}
.upload-zone p{color:var(--sub);font-size:12px}
.upload-zone p b{color:var(--blue)}
#img-preview-wrap{display:none;margin-top:10px;position:relative}
#img-preview{width:100%;border-radius:8px;border:1px solid var(--border);max-height:300px;object-fit:contain}

/* OCR progress */
#ocr-status{display:none;margin-top:10px;background:var(--card2);border-radius:8px;padding:10px 12px}
.ocr-bar-wrap{background:var(--border);border-radius:4px;height:5px;margin-top:6px}
.ocr-bar{background:var(--blue);height:5px;border-radius:4px;width:0%;transition:.3s}
.ocr-msg{font-size:11px;color:var(--sub)}

/* Table */
.tbl-header{display:grid;grid-template-columns:36px 1fr 80px 80px 28px;gap:5px;font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px;padding:0 2px}
.tbl-row{display:grid;grid-template-columns:36px 1fr 80px 80px 28px;gap:5px;align-items:center;margin-bottom:5px}
.tbl-row input{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:5px 7px;color:var(--text);font-size:12px;outline:none;width:100%}
.tbl-row input:focus{border-color:var(--blue)}
.row-num{font-size:10px;color:var(--sub);text-align:center}
.del-btn{background:none;border:none;color:var(--sub);cursor:pointer;font-size:15px;line-height:1}
.del-btn:hover{color:var(--red)}
.add-row-btn{width:100%;background:none;border:1px dashed var(--border);border-radius:7px;padding:7px;color:var(--sub);font-size:12px;cursor:pointer;margin-top:3px}
.add-row-btn:hover{border-color:var(--blue);color:var(--blue)}

/* Confidence badge */
.conf-high{color:var(--green);font-size:10px}
.conf-low{color:var(--amber);font-size:10px}

/* Buttons */
.btn-row{display:flex;gap:8px}
.btn-p{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;flex:1}
.btn-s{background:var(--card2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:12px;font-weight:600;cursor:pointer}
.btn-p:disabled{opacity:.4;cursor:not-allowed}

/* Search */
.search-box{position:relative}
.search-box input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text);font-size:12px;outline:none}
.search-box input:focus{border-color:var(--blue)}
.sdrop{position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:8px;z-index:99;max-height:180px;overflow-y:auto;display:none}
.si{padding:7px 12px;cursor:pointer;display:flex;gap:8px;align-items:center;border-bottom:1px solid var(--border)22}
.si:hover{background:#ffffff08}
.si-code{font-size:10px;color:var(--blue);font-weight:700;width:52px;flex-shrink:0}
.si-name{font-size:12px;flex:1}
.si-cat{font-size:9px;color:var(--sub);background:var(--border);padding:1px 5px;border-radius:8px}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--border);color:var(--text);padding:8px 18px;border-radius:20px;font-size:12px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.step-label{display:inline-block;background:var(--blue)22;color:var(--blue);border-radius:20px;padding:1px 9px;font-size:10px;font-weight:700;margin-right:6px}
</style>
</head>
<body>
<h1>📷 台股截圖轉換器</h1>
<p class="sub">上傳券商 App 截圖 → 自動識別持股 → 匯出 Dashboard 格式</p>

<!-- Step 1: Upload -->
<div class="card">
  <h2><span class="step-label">1</span>上傳截圖</h2>
  <div class="upload-zone" id="drop-zone" onclick="document.getElementById('file-in').click()"
    ondragover="event.preventDefault();this.classList.add('drag')"
    ondragleave="this.classList.remove('drag')"
    ondrop="handleDrop(event)">
    <div class="icon">📱</div>
    <p><b>點擊選擇</b>或拖放截圖至此</p>
    <p style="margin-top:4px">支援 JPG、PNG</p>
  </div>
  <input type="file" id="file-in" accept="image/*" style="display:none" onchange="handleFile(this.files[0])">
  <div id="img-preview-wrap">
    <img id="img-preview" src="" alt="預覽">
  </div>
  <div id="ocr-status">
    <div class="ocr-msg" id="ocr-msg">準備中…</div>
    <div class="ocr-bar-wrap"><div class="ocr-bar" id="ocr-bar"></div></div>
  </div>
</div>

<!-- Step 2: Edit table -->
<div class="card">
  <h2><span class="step-label">2</span>確認 / 編輯持股資料</h2>
  <div style="margin-bottom:10px">
    <div class="search-box">
      <input id="s-input" type="text" placeholder="搜尋後加入（代號或名稱）" oninput="doSearch(this.value)">
      <div class="sdrop" id="sdrop"></div>
    </div>
  </div>
  <div class="tbl-header"><div>#</div><div>名稱（代號）</div><div>股數</div><div>均價</div><div></div></div>
  <div id="rows"></div>
  <button class="add-row-btn" onclick="addRow()">＋ 新增一列</button>
</div>

<!-- Step 3: Export -->
<div class="card">
  <h2><span class="step-label">3</span>匯出</h2>
  <div class="btn-row">
    <button class="btn-s" onclick="buildPreview()">👁 預覽</button>
    <button class="btn-p" id="export-btn" onclick="exportJSON()">📥 下載 JSON（匯入 Dashboard）</button>
  </div>
  <div id="preview-area" style="margin-top:10px;font-size:11px;color:var(--sub)"></div>
</div>

<div class="toast" id="toast"></div>

// Name→code fuzzy map for OCR matching
const NAME_MAP = {};
DB.forEach(s=>{
  NAME_MAP[s.n]=s.c;
  // partial keys
  const words = s.n.split('');
  if(s.n.length>2) NAME_MAP[s.n.slice(0,4)]=s.c;
});
// Extra manual mappings for common OCR variants
const EXTRA={
  '主動統一台股增長':'00933','主動群益台灣強棒':'00909',
  '統一台股增長':'00933','群益台灣強棒':'00909',
  '元大台灣50':'0050','元大美債':'00679B','元大美債20':'00679B',
  '復華富時不動產':'00712','復華富時':'00712',
  '永豐美國500':'00858','永豐美國500大':'00858',
};

let rows=[], rid=0;

// ── Toast ─────────────────────────────────────────────────────
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.opacity=1;setTimeout(()=>t.style.opacity=0,2200);}

// ── File handling ─────────────────────────────────────────────
function handleDrop(e){e.preventDefault();document.getElementById('drop-zone').classList.remove('drag');const f=e.dataTransfer.files[0];if(f)handleFile(f);}
function handleFile(f){
  if(!f||!f.type.startsWith('image/'))return;
  const url=URL.createObjectURL(f);
  const pw=document.getElementById('img-preview-wrap');
  document.getElementById('img-preview').src=url;
  pw.style.display='block';
  runOCR(f);
}

// ── OCR ───────────────────────────────────────────────────────
async function runOCR(file){
  const st=document.getElementById('ocr-status');
  const bar=document.getElementById('ocr-bar');
  const msg=document.getElementById('ocr-msg');
  st.style.display='block';
  msg.textContent='載入 OCR 引擎…';
  try{
    const worker=await Tesseract.createWorker('chi_tra+eng',1,{
      logger:p=>{
        if(p.status==='recognizing text'){
          bar.style.width=(p.progress*100)+'%';
          msg.textContent=`辨識中… ${Math.round(p.progress*100)}%`;
        } else {
          msg.textContent=p.status;
        }
      }
    });
    msg.textContent='辨識中…';
    const {data:{text}}=await worker.recognize(file);
    await worker.terminate();
    msg.textContent='✅ 辨識完成，正在解析…';
    bar.style.width='100%';
    const parsed=parseOCR(text);
    if(parsed.length){
      rows=parsed;
      renderRows();
      toast(`成功識別 ${parsed.length} 檔持股 ✓`);
      msg.textContent=`✅ 識別 ${parsed.length} 檔，請確認並修正後匯出`;
    } else {
      msg.textContent='⚠️ 未能自動識別，請手動填入';
      toast('自動識別失敗，請手動輸入');
    }
  } catch(e){
    msg.textContent='❌ OCR 失敗：'+e.message;
    console.error(e);
  }
}

// ── Parse OCR output ──────────────────────────────────────────
function parseOCR(raw){
  const lines=raw.split('\n').map(l=>l.trim()).filter(l=>l.length>0);
  const results=[];
  // Pattern: find pairs of lines where
  //   line A: [Name] [price] [shares] [pl]
  //   line B: 現股  [cost]  [shares] [pl%]
  // Numbers: extract all numbers from a line
  const nums=l=>[...l.matchAll(/[\d,]+\.?\d*/g)].map(m=>parseFloat(m[0].replace(/,/g,'')));
  
  let i=0;
  while(i<lines.length){
    const line=lines[i];
    // Skip header/footer lines
    if(/名稱|市價|均價|股數|損益|注意事項|可下單|股票市值|股票報酬/.test(line)){i++;continue;}
    
    // Check if this looks like a stock name line (has Chinese chars, not just numbers)
    const hasChinese=/[一-鿿]/.test(line);
    if(!hasChinese){i++;continue;}
    
    // Skip lines that are just "現股" or similar labels
    if(/^現股$|^整股$/.test(line)){i++;continue;}
    
    // Extract numbers from this line
    const n0=nums(line);
    // Look for next line with numbers (the 現股 cost line)
    let costLine=null;
    for(let j=i+1;j<Math.min(i+4,lines.length);j++){
      if(/現股|整股/.test(lines[j])||nums(lines[j]).length>=2){
        costLine=lines[j];
        break;
      }
    }
    
    // Try to extract shares and cost
    let qty=null, cost=null, mktPrice=null;
    
    // From first line: market price is usually the first number, shares a round number
    if(n0.length>=2){
      // Shares tend to be integer multiples of 100 or 1000
      for(const v of n0){
        if(Number.isInteger(v)&&v>=100&&v%100===0){qty=v;break;}
        if(Number.isInteger(v)&&v>=10&&v<=50000){qty=v;}
      }
      // Market price: first decimal number
      for(const v of n0){
        if(!Number.isInteger(v)||v<1000){mktPrice=v;break;}
      }
    }
    
    if(costLine){
      const nc=nums(costLine);
      // Cost = first decimal number in cost line
      for(const v of nc){
        if(v>0&&v<10000&&v!==qty){cost=v;break;}
      }
      if(!qty){
        for(const v of nc){
          if(Number.isInteger(v)&&v>=100){qty=v;break;}
        }
      }
    }
    
    // Extract name: the Chinese text portion
    const nameMatch=line.match(/^([一-鿿A-Za-z0-9\-\+]+)/);
    let name=nameMatch?nameMatch[1].trim():'';
    // Remove trailing numbers that got merged
    name=name.replace(/\d+(\.\d+)?$/, '').trim();
    
    if(name.length>=2&&(qty||cost)){
      // Try to find code
      const code=findCode(name);
      results.push({id:rid++, code:code||'', name, qty:qty||'', cost:cost||''});
    }
    i++;
  }
  
  // Deduplicate by name
  const seen=new Set();
  return results.filter(r=>{
    const k=r.name+r.qty;
    if(seen.has(k))return false;
    seen.add(k);
    return true;
  });
}

function findCode(name){
  // Direct match
  if(EXTRA[name])return EXTRA[name];
  for(const[k,v] of Object.entries(EXTRA)){
    if(name.includes(k)||k.includes(name))return v;
  }
  // DB search
  for(const s of DB){
    if(s.n===name||name.includes(s.n)||s.n.includes(name))return s.c;
  }
  return '';
}

// ── Rows UI ───────────────────────────────────────────────────
function addRow(code='',name='',qty='',cost=''){
  rows.push({id:rid++,code,name,qty,cost});
  renderRows();
}
function removeRow(id){rows=rows.filter(r=>r.id!==id);renderRows();}
function syn(id,f,v){const r=rows.find(r=>r.id===id);if(r)r[f]=v;}
function autoCode(id){
  const r=rows.find(r=>r.id===id);
  if(!r||r.code)return;
  const c=findCode(r.name);
  if(c){r.code=c;document.getElementById('code-'+id).value=c;toast('自動填入代碼：'+c);}
}

function renderRows(){
  const el=document.getElementById('rows');
  if(!rows.length){el.innerHTML='<p style="color:var(--sub);font-size:11px;text-align:center;padding:12px">尚無資料</p>';return;}
  el.innerHTML=rows.map((r,i)=>`
    <div class="tbl-row">
      <div class="row-num">${i+1}</div>
      <div style="display:flex;flex-direction:column;gap:3px">
        <input type="text" id="name-${r.id}" value="${r.name}" placeholder="名稱" oninput="syn(${r.id},'name',this.value)" onblur="autoCode(${r.id})" style="font-size:11px">
        <input type="text" id="code-${r.id}" value="${r.code}" placeholder="代碼" oninput="syn(${r.id},'code',this.value)" style="font-size:10px;color:var(--blue)">
      </div>
      <input type="number" id="qty-${r.id}" value="${r.qty}" placeholder="股數" oninput="syn(${r.id},'qty',this.value)">
      <input type="number" id="cost-${r.id}" value="${r.cost}" placeholder="均價" step="0.01" oninput="syn(${r.id},'cost',this.value)">
      <button class="del-btn" onclick="removeRow(${r.id})">✕</button>
    </div>
  `).join('');
}

// ── Search ────────────────────────────────────────────────────
function doSearch(q){
  const drop=document.getElementById('sdrop');
  if(!q.trim()){drop.style.display='none';return;}
  const lq=q.toLowerCase();
  const res=DB.filter(s=>s.c.toLowerCase().includes(lq)||s.n.includes(q)||s.n.toLowerCase().includes(lq)).slice(0,10);
  if(!res.length){drop.style.display='none';return;}
  drop.innerHTML=res.map(s=>`<div class="si" onclick="pickSearch('${s.c}','${s.n.replace(/'/g,'&#39;')}','${s.cat}')"><span class="si-code">${s.c}</span><span class="si-name">${s.n}</span><span class="si-cat">${s.cat}</span></div>`).join('');
  drop.style.display='block';
}
function pickSearch(c,n,cat){
  document.getElementById('sdrop').style.display='none';
  document.getElementById('s-input').value='';
  addRow(c,n,'','');
  setTimeout(()=>{const el=document.getElementById('qty-'+(rid-1));if(el)el.focus();},50);
}
document.addEventListener('click',e=>{if(!e.target.closest('.search-box'))document.getElementById('sdrop').style.display='none';});

// ── Export ────────────────────────────────────────────────────
function buildPreview(){
  const area=document.getElementById('preview-area');
  const valid=rows.filter(r=>r.qty&&r.cost);
  if(!valid.length){area.innerHTML='<span style="color:var(--amber)">請填入股數和均價</span>';return;}
  const total=valid.reduce((s,r)=>s+parseFloat(r.qty)*parseFloat(r.cost),0);
  area.innerHTML=`共 <b style="color:var(--text)">${valid.length}</b> 檔，投入總成本 <b style="color:var(--red)">$${Math.round(total).toLocaleString()}</b> 元`;
}
function exportJSON(){
  buildPreview();
  const today=new Date().toLocaleDateString('zh-TW');
  const holdings=rows.filter(r=>r.qty&&r.cost).map(r=>{
    const code=(r.code||r.name).trim().toUpperCase();
    const found=DB.find(s=>s.c===code);
    return {code,name:r.name||found?.n||code,cat:found?.cat||'ETF',qty:parseInt(r.qty),cost:parseFloat(r.cost),target:null,stop:null,signalAlert:null,note:'',added:today};
  });
  if(!holdings.length){toast('請先填入股數和均價');return;}
  const blob=new Blob([JSON.stringify({version:3,username:'匯入',holdings,alertLog:[],exportedAt:new Date().toISOString()},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`台股持股_${today.replace(/\//g,'-')}.json`;a.click();
  toast(`已下載 ${holdings.length} 檔持股 ✓`);
}

renderRows();
</script>
